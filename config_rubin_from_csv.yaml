# ═══════════════════════════════════════════════════════════════════════
# SPECTRA: Rubin Objects from CSV File
# ═══════════════════════════════════════════════════════════════════════
# Process a list of Rubin objectIds from a CSV file
# Useful for curated samples or follow-up observations
# ═══════════════════════════════════════════════════════════════════════

input:
  type: rubin_from_csv
  filepath: "data/rubin_object_list.csv"
  id_column: "object_id"           # Column name with Rubin objectIds
  redshift_column: "redshift"      # Optional: if redshifts are known

rubin:
  rsp_token: YOUR_RSP_TOKEN_HERE
  flux_type: psfFlux
  bands: [u, g, r, i, z, y]

ssp_model:
  type: fsps
  imf: chabrier
  dust_type: 2

fitting:
  method: ml
  error_floor: 0.05
  parameters: [mass, age, metallicity, dust]
  priors:
    mass:         [8.0,  13.0]
    age:          [0.001, 13.5]
    metallicity:  [-2.5,  0.5]
    dust:         [0.0,   3.0]

plotting:
  output_dir: "outputs/rubin_from_csv"
  save_plots: true
  dpi: 150

output:
  save_photometry: true
