# ═══════════════════════════════════════════════════════════════════════
# SPECTRA Config: Minimal Plotting Style
# ═══════════════════════════════════════════════════════════════════════
# Clean, simple plots for quick analysis
# ═══════════════════════════════════════════════════════════════════════

input:
  type: phangs_fits
  filepath: "/Users/snehanair/Downloads/catalogs 2/hlsp_phangs-cat_hst_uvis_ic5332_multi_v1_obs-human-cluster-class12.fits"
  max_rows: 5

ssp_model:
  type: fsps
  imf: chabrier
  dust_type: 2

fitting:
  method: ml
  parameters: [mass, age, metallicity, dust]
  priors:
    mass:         [2.0,  7.0]
    age:          [0.001, 1.0]
    metallicity:  [-1.5,  0.3]
    dust:         [0.0,   1.5]

plotting:
  output_dir: "outputs/minimal_plots"
  plot_style: minimal
  figure_size: [10, 7]
  dpi: 150
  
  # Minimal components
  show_components: false        # No unattenuated spectrum
  show_error_bars: true
  show_residuals: false         # No residual panel
  show_parameter_box: true
  show_grid: false
  
  # Simple grayscale colors
  color_scheme:
    observed: "#2C3E50"
    model: "#E74C3C"
  
  marker_size_obs: 10
  marker_size_model: 100
  line_width: 1.5
  legend_location: best
  legend_fontsize: 9

output:
  save_photometry: false
