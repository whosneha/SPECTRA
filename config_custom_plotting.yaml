# ═══════════════════════════════════════════════════════════════════════
# SPECTRA Config: Custom Plotting Demonstration
# ═══════════════════════════════════════════════════════════════════════
# Shows all available plotting customization options
# ═══════════════════════════════════════════════════════════════════════

input:
  type: phangs_fits
  filepath: "/Users/snehanair/Downloads/catalogs 2/hlsp_phangs-cat_hst_uvis_ic5332_multi_v1_obs-human-cluster-class12.fits"
  max_rows: 3

ssp_model:
  type: fsps
  redshift: 0.00184
  imf: chabrier
  sfh: 0
  dust_type: 2
  add_neb_emission: false
  distance_mpc: 9.01

fitting:
  method: ml
  error_floor: 0.05
  parameters: [mass, age, metallicity, dust]
  priors:
    mass:         [2.0,  7.0]
    age:          [0.001, 1.0]
    metallicity:  [-1.5,  0.3]
    dust:         [0.0,   1.5]

# ═══════════════════════════════════════════════════════════════════════
# PLOTTING CUSTOMIZATION OPTIONS
# ═══════════════════════════════════════════════════════════════════════
plotting:
  output_dir: "outputs/custom_plotting_demo"
  show_plots: false
  save_plots: true
  
  # ── Output Format ──
  formats: [png, pdf]           # Save both PNG and PDF
  dpi: 300                      # High resolution for publications
  
  # ── Plot Style ──
  plot_style: publication       # Options: default, minimal, publication
  figure_size: [14, 10]         # Width, height in inches
  
  # ── Components to Show ──
  show_components: true         # Show unattenuated stellar spectrum
  show_error_bars: true         # Show error bars on observed data
  show_residuals: true          # Show residual panel (bottom)
  show_parameter_box: true      # Show text box with best-fit params
  show_grid: true               # Show grid lines
  grid_alpha: 0.3               # Grid transparency (0-1)
  
  # ── Color Scheme ──
  color_scheme:
    observed: "#3498DB"         # Light blue for observed photometry
    model: "#E74C3C"            # Red for model
    unattenuated: "#F39C12"     # Orange for unattenuated spectrum
    residual_good: "#27AE60"    # Green for ±1σ residuals
    residual_warn: "#F39C12"    # Orange for ±2σ
    residual_bad: "#C0392B"     # Dark red for >2σ
  
  # ── Marker Styles ──
  marker_size_obs: 14           # Observed photometry marker size
  marker_size_model: 150        # Model photometry marker size
  line_width: 2.0               # Spectrum line width
  
  # ── Legend ──
  legend_location: upper right  # Options: upper/lower left/right, best
  legend_fontsize: 11
  
  # ── Units (future feature) ──
  wavelength_units: micron      # Options: micron, angstrom, nm
  flux_units: jy                # Options: jy, mjy, erg

output:
  save_photometry: true
