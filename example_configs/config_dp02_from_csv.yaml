# ─────────────────────────────────────────────────────────────────────────────
# SPECTRA config — Run on locally-saved DP0.2 photometry
#
# First download test data:
#   export RSP_TOKEN="your_token"
#   python scripts/query_dp02_test_objects.py
#
# Then run (no RSP connection needed):
#   spectra --config example_configs/config_dp02_from_csv.yaml
# ─────────────────────────────────────────────────────────────────────────────

input:
  type: csv
  filepath: "data/dp02_test_galaxies.csv"

ssp_model:
  type: fsps
  redshift: 0.0
  imf: chabrier
  sfh: 0
  dust_type: 2
  add_neb_emission: false

fitting:
  method: ml
  error_floor: 0.05
  parameters: [mass, age, metallicity, dust]
  priors:
    mass:         [8.0, 13.0]
    age:          [0.1, 13.5]
    metallicity:  [-2.5, 0.5]
    dust:         [0.0, 3.0]

plotting:
  output_dir: "outputs/dp02_from_csv"
  show_plots: false
  save_plots: true
  plot_format: png
  dpi: 150

output:
  save_photometry: true
