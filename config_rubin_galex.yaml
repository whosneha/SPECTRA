# ═══════════════════════════════════════════════════════════════════════
# SPECTRA: Rubin/LSST + GALEX Multi-Wavelength SED Fitting
# ═══════════════════════════════════════════════════════════════════════
# Wavelength coverage: 1528 Å (GALEX FUV) to 9712 Å (Rubin y-band)
# Total: 8 photometric bands (2 UV + 6 optical)
# ═══════════════════════════════════════════════════════════════════════

input:
  type: rubin_id
  rubin_id: 1234567890

rubin:
  rsp_token: YOUR_RSP_TOKEN_HERE
  flux_type: psfFlux
  bands: [u, g, r, i, z, y]

additional_data:
  enabled: true
  files:
    - path: "data/galex_rubin_1234567890.csv"
      format: csv

ssp_model:
  type: fsps
  redshift: 0.05
  imf: chabrier
  sfh: 0
  dust_type: 2
  add_neb_emission: true
  distance_mpc: 250.0

fitting:
  method: mcmc
  error_floor: 0.05
  parameters:
    - mass
    - age
    - metallicity
    - dust
  
  priors:
    mass:         [9.0,  12.0]
    age:          [0.1,  13.5]
    metallicity:  [-2.0,  0.5]
    dust:         [0.0,   2.0]

mcmc:
  n_walkers:  64
  n_steps:    3000
  burn_in:    500
  thin:       10

plotting:
  output_dir: "outputs/rubin_galex"
  show_plots: false
  save_plots: true
  plot_format: png
  dpi: 300

output:
  save_photometry: true
