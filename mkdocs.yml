site_name: SPECTRA - Spectral Energy Distribution Fitting
site_description: A Python package for SED fitting using SSP models
site_author: SPECTRA Team
repo_url: https://github.com/yourusername/SPECTRA
repo_name: SPECTRA

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.annotate
    - content.code.copy

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: true
            show_root_heading: true
            heading_level: 2

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - pymdownx.arithmatex:
      generic: true
  - attr_list
  - md_in_html

extra_javascript:
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Quick Start: getting-started/quickstart.md
      - Configuration: getting-started/configuration.md
  - User Guide:
      - Input Data: user-guide/input-data.md
      - Data Loaders: user-guide/data-loaders.md
      - External Sources: user-guide/external-sources.md
      - SSP Models: user-guide/ssp-models.md
      - Fitting Methods: user-guide/fitting-methods.md
      - MCMC Sampling: user-guide/mcmc.md
      - Visualization: user-guide/visualization.md
      - Batch Processing: user-guide/batch-processing.md
  - Tutorials:
      - Single Object Fitting: tutorials/single-object.md
      - FITS Batch Processing: tutorials/fits-batch.md
      - Rubin Observatory Data: tutorials/rubin-data.md
      - Custom Models: tutorials/custom-models.md
  - API Reference:
      - Main: api/main.md
      - Data Loading: api/data-loading.md
      - Models: api/models.md
      - Likelihood: api/likelihood.md
      - Fitting: api/fitting.md
      - MCMC: api/mcmc.md
      - Utils: api/utils.md
  - Examples:
      - Example Configs: examples/configs.md
      - Gallery: examples/gallery.md
  - Development:
      - Contributing: development/contributing.md
      - Testing: development/testing.md
      - Release Notes: development/releases.md
