# ═══════════════════════════════════════════════════════════════════════
# SPECTRA Config: Presentation/Talk Style
# ═══════════════════════════════════════════════════════════════════════
# Large fonts, bold colors, high contrast for projector visibility
# ═══════════════════════════════════════════════════════════════════════

input:
  type: phangs_fits
  filepath: "/Users/snehanair/Downloads/catalogs 2/hlsp_phangs-cat_hst_uvis_ic5332_multi_v1_obs-human-cluster-class12.fits"
  max_rows: 2

ssp_model:
  type: fsps
  imf: chabrier
  dust_type: 2

fitting:
  method: ml
  parameters: [mass, age, metallicity, dust]
  priors:
    mass:         [2.0,  7.0]
    age:          [0.001, 1.0]
    metallicity:  [-1.5,  0.3]
    dust:         [0.0,   1.5]

plotting:
  output_dir: "outputs/presentation_plots"
  plot_style: publication       # Large fonts
  figure_size: [16, 12]         # Extra large for projector
  dpi: 150                      # Lower DPI for smaller files
  
  # Show key components
  show_components: true
  show_error_bars: true
  show_residuals: true
  show_parameter_box: true
  show_grid: true
  grid_alpha: 0.2
  
  # High-contrast colors
  color_scheme:
    observed: "#1F77B4"         # Strong blue
    model: "#FF7F0E"            # Strong orange
    unattenuated: "#2CA02C"     # Strong green
    residual_good: "#17BECF"
    residual_warn: "#FFBB78"
    residual_bad: "#D62728"
  
  # Extra large markers for visibility
  marker_size_obs: 18
  marker_size_model: 200
  line_width: 3.0
  legend_location: upper left
  legend_fontsize: 14

output:
  save_photometry: true
